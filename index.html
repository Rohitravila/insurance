<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Foodie's Paradise</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(to right, #ffecd2, #fcb69f);
}

/* Navbar */
nav {
  display: flex;
  justify-content: space-between;
  padding: 15px 40px;
  background: #ff5733;
  color: white;
  position: sticky;
  top: 0;
}

nav a {
  color: white;
  margin: 0 10px;
  text-decoration: none;
  font-weight: bold;
}

/* Hero Section */
.hero {
  text-align: center;
  padding: 80px 20px;
  color: #333;
}

.hero h1 {
  font-size: 50px;
}

.hero button {
  padding: 12px 25px;
  background: #ff5733;
  border: none;
  color: white;
  font-size: 18px;
  border-radius: 25px;
  cursor: pointer;
}

.hero button:hover {
  background: #c70039;
}

/* Menu */
.menu {
  padding: 40px;
  text-align: center;
}

.menu h2 {
  font-size: 35px;
}

.menu-items {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
  margin-top: 30px;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 15px;
  box-shadow: 0 5px 10px rgba(0,0,0,0.2);
  transition: transform 0.3s;
}

.card:hover {
  transform: scale(1.05);
}

.card img {
  width: 100%;
  border-radius: 10px;
}

.card button {
  margin-top: 10px;
  padding: 10px;
  border: none;
  background: #ff5733;
  color: white;
  border-radius: 20px;
  cursor: pointer;
}

/* Cart */
.cart {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #ff5733;
  color: white;
  padding: 15px;
  border-radius: 50px;
  cursor: pointer;
}

/* Footer */
footer {
  text-align: center;
  padding: 20px;
  background: #333;
  color: white;
}
</style>
</head>

<body>

<nav>
  <h2>🍴 Foodie's</h2>
  <div>
    <a href="#home">Home</a>
    <a href="#menu">Menu</a>
  </div>
</nav>

<section class="hero" id="home">
  <h1>Delicious Food Delivered</h1>
  <p>Experience the best taste in town</p>
  <button onclick="scrollToMenu()">Explore Menu</button>
</section>

<section class="menu" id="menu">
  <h2>Our Menu</h2>

  <div class="menu-items">

    <div class="card">
      <img src="https://source.unsplash.com/300x200/?pizza">
      <h3>Pizza</h3>
      <p>Cheesy delight</p>
      <button onclick="addToCart('Pizza')">Add to Cart</button>
    </div>

    <div class="card">
      <img src="https://source.unsplash.com/300x200/?burger">
      <h3>Burger</h3>
      <p>Juicy and tasty</p>
      <button onclick="addToCart('Burger')">Add to Cart</button>
    </div>

    <div class="card">
      <img src="https://source.unsplash.com/300x200/?pasta">
      <h3>Pasta</h3>
      <p>Italian classic</p>
      <button onclick="addToCart('Pasta')">Add to Cart</button>
    </div>

  </div>
</section>

<div class="cart" onclick="viewCart()">
  🛒 Cart (<span id="count">0</span>)
</div>

<footer>
  <p>© 2026 Foodie's Paradise</p>
</footer>

<script>
let cart = [];

function scrollToMenu() {
  document.getElementById("menu").scrollIntoView({ behavior: "smooth" });
}

function addToCart(item) {
  cart.push(item);
  document.getElementById("count").innerText = cart.length;
  alert(item + " added to cart!");
}

function viewCart() {
  if(cart.length === 0) {
    alert("Cart is empty!");
  } else {
    alert("Items: " + cart.join(", "));
  }
}
</script>

</body>
</html>
